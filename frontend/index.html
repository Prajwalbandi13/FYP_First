<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CureX – Lung Disease Detection</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <h1>CureX</h1>
        <p class="subtitle">AI-Powered Lung Disease Detection System</p>

        <div class="content">

            <!-- LEFT SECTION -->
            <div class="upload-section">
                <form id="uploadForm">
                    <input type="file" id="imageInput" accept="image/png, image/jpeg" required />
                    <button type="submit">Detect Disease</button>
                </form>

                <!-- IMAGE PREVIEW -->
                <div id="preview" class="preview-box"></div>

                <!-- HEATMAP BUTTON -->
                <button id="toggleHeatmap" class="hidden heatmap-btn">
                    🔥 Show AI Heatmap
                </button>

                <!-- HEATMAP IMAGE -->
                <div id="heatmapContainer" class="hidden heatmap-box">
                    <h3>AI Attention Map</h3>
                    <img id="heatmapImage" />
                </div>

                <!-- RESULT CARD -->
                <div id="result" class="result-card hidden">
                    <h2>🩺 Diagnosis Result</h2>

                    <div class="result-grid">
                        <div class="result-item">
                            <span class="label">Disease</span>
                            <span class="value" id="disease"></span>
                        </div>

                        <div class="result-item">
                            <span class="label">Confidence</span>
                            <span class="value" id="confidence"></span>
                        </div>

                        <div class="result-item">
                            <span class="label">Severity</span>
                            <span class="value" id="severity"></span>
                        </div>
                    </div>
                </div>

                <!-- PDF BUTTON -->
                <button id="downloadReport" class="hidden pdf-btn">
                    📄 Download Medical Report
                </button>

            </div>

            <!-- RIGHT SECTION -->
            <div class="results-section">
                <h2>Diagnosis Results</h2>
                <div id="gemini-results">
                    <p class="placeholder">No results available yet.</p>
                </div>
            </div>

        </div>
    </div>

    <!-- jsPDF CDN (REQUIRED for PDF export) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Your Script -->
    <script src="script.js"></script>
</body>

</html>
